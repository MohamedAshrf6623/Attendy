on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    tags: [ "**" ]

jobs:
  build_and_push:
    name: Docker Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Docker Login
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:latest .
      - name: Docker Tag
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:latest \
          ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:${{ github.sha }}

          # Tag the image with the semantic tag if it exists
          if [ "${{ github.ref_type }}" = "tag" ]; then
              docker tag ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:latest \
              ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:${{ github.ref_name }}
          fi

      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:${{ github.sha }}

          # Push the tag if it exists (semantic release) 
          if [ "${{ github.ref_type }}" = "tag" ]; then
              docker push ${{ secrets.DOCKERHUB_USERNAME }}/ai_facenet_service:${{ github.ref_name }}
          fi